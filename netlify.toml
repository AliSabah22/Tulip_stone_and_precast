[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# ── Redirect rules ──────────────────────────────────────────────────────────

# Strip trailing slashes for canonical URLs (except root)
[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/*/"
  to = "/:splat"
  status = 301
  force = false

# 404 fallback for unknown routes
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# ── Security headers — applied to all routes ────────────────────────────────

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()"
    X-XSS-Protection = "1; mode=block"

# ── Cache-Control — HTML: never cache (always fresh) ───────────────────────

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ── Cache-Control — Astro asset bundles: 1 year, immutable ─────────────────

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Cache-Control — Fonts: 1 year, immutable ───────────────────────────────

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Cache-Control — Public images: 1 year, immutable ───────────────────────

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Cache-Control — Favicon and static assets: 1 week ──────────────────────

[[headers]]
  for = "/favicon*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/*.ico"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# ── Sitemap and robots: short cache ────────────────────────────────────────

[[headers]]
  for = "/sitemap*.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"
